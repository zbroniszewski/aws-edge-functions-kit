version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: 'daily'
      time: '06:00'
      timezone: 'America/New_York'
    assignees:
      - 'zbroniszewski'
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
