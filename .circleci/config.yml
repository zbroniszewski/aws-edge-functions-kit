---
version: 2.1
setup: true
orbs:
  path-filtering: circleci/path-filtering@0.1.3
  continuation: circleci/continuation@0.3.1
parameters:
  manual-deploy-functions:
    type: boolean
    default: false
workflows:
  setup:
    unless: << pipeline.parameters.manual-deploy-functions >>
    jobs:
      - path-filtering/filter:
          name: check-file-changes
          # <regex path-to-test> <parameter-to-set> <value-of-pipeline-parameter>
          mapping: |
            ./config/cloudfront.yaml deploy-functions true
            ./src/.* deploy-functions true
            ./deploy.ts deploy-functions true
          base-revision: main
          # this is the path of the configuration we should trigger once
          # path filtering and pipeline parameter value updates are
          # complete. In this case, we are using the parent dynamic
          # configuration itself.
          config-path: .circleci/continue_config.yml
  setup-manual:
    when: << pipeline.parameters.manual-deploy-functions >>
    jobs:
      - continuation/continue:
          configuration_path: .circleci/continue_config.yml
          parameters: /tmp/pipeline-parameters.json
          pre-steps:
            - run:
                command: |
                  echo '{ "deploy-functions": << pipeline.parameters.manual-deploy-functions >> }' >> /tmp/pipeline-parameters.json
